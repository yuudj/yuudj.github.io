<html lang="en" ng-app="BlankApp" ng-cloak>

<head >
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="description" content="MQTT IoT Demo">
    <meta name="author" content="yuudj">
    <!-- Angular Material style sheet -->
    <link rel="stylesheet" href="https://ajax.googleapis.com/ajax/libs/angular_material/1.1.0/angular-material.min.css">
    <style>
        html {
            font-size: 62.5%;
            line-height: 1.4;
        }
        
        body {
            font-size: 1.6rem;
            overflow: hidden;
            max-width: 100%;
            max-height: 100%;
            background-color: #ffffff;
            background-image: url("https://www.transparenttextures.com/patterns/random-grey-variations.png");
        }
        
        body.evilMode {
            background-color: darkred;
        }
        
        md-content {
            background-color: transparent;
        }
    </style>
</head>

<body ng-controller="AppCtrl" layout ng-class="{'evilMode': evilMode}">
    <div layout-fill layout="column">
        <md-toolbar class="md-whiteframe-1dp" ng-class="{'md-warn': evilMode, 'md-primary': !evilMode}">
            <div class="md-toolbar-tools">
                <h2>The "Thing"</h2>
                <span flex></span>
            </div>
        </md-toolbar>
        <md-content layout flex layout-padding>
            <div flex layout-align="center center">
                <ui-knob value="temp.value" options="temp.options"></ui-knob>
            </div>
            <div flex layout-align="center center">
                <ui-knob value="hum.value" options="hum.options"></ui-knob>

            </div>
        </md-content>
         <md-button class="md-fab" ng-disabled="false" aria-label="Evil Mode" style="position:absolute; bottom:10px; left:10px" ng-click="evilMode=!evilMode">
            <md-icon md-svg-src="img/devil.svg"></md-icon>
        </md-button>
    </div>


    <!-- Angular Material requires Angular.js Libraries -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.5.5/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.5.5/angular-animate.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.5.5/angular-aria.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.5.5/angular-messages.min.js"></script>
  
    <!-- Angular Material Library -->
    <script src="https://ajax.googleapis.com/ajax/libs/angular_material/1.1.0/angular-material.min.js"></script>

    
    <!-- Angular knobs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/3.5.10/d3.min.js"></script>
    <script src="https://rawgit.com/RadMie/ng-knob/master/dist/ng-knob.min.js"></script>
    <!-- MQTT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.2/mqttws31.min.js"></script>
    
    <script src="demo.js"></script>

    <!-- Your application bootstrap  -->
    <script type="text/javascript">
    
    

  </script>

</body>

</html>
